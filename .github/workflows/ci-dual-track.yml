name: ci-dual-track

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflow files
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          fail_level: error

  dual-track-matrix:
    name: dual-track-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gateway/pyproject.toml
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies for Rust/Tauri compile
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Upgrade pip
        run: python -m pip install -U pip
      - name: Install gateway dev dependencies
        run: python -m pip install -e gateway[dev]
      - name: Install gateway build tools
        run: python -m pip install pyinstaller nuitka
      - name: Install cargo-tauri CLI on macOS
        if: matrix.os == 'macos-latest'
        run: cargo install tauri-cli --version "^2" --locked
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - name: Run gateway tests
        run: cd gateway && python -m pytest tests -q
      - name: Build gateway (dual track) on macOS
        if: matrix.os == 'macos-latest'
        run: cd gateway && ./scripts/build_gateway.sh --track all
      - name: Verify gateway_artifact track selection on macOS
        if: matrix.os == 'macos-latest'
        run: cargo test --manifest-path src-tauri/Cargo.toml gateway_artifact -- --nocapture
      - name: Build tauri app (no bundle) on macOS
        if: matrix.os == 'macos-latest'
        run: cargo tauri build --no-bundle --no-sign
      - name: Ensure dist precondition on non-macOS
        if: matrix.os != 'macos-latest'
        run: mkdir -p dist/gateway
      - name: Verify gateway_artifact track selection on non-macOS
        if: matrix.os != 'macos-latest'
        run: cargo test --manifest-path src-tauri/Cargo.toml gateway_artifact -- --nocapture
